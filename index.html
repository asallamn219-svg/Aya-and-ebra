            border: none;
            padding: 10px 28px;
            border-radius: 60px;

            font-weight: bold;
            color: #2c472c;
            cursor: pointer;

            align-items: center;
            gap: 8px;

            background: #fef7e6;
            border-radius: 32px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);

            overflow: hidden;
        }
        .surah-header {
            background: #f3e9ce;

            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
        }

            font-size: 1rem;
            padding: 8px 16px;

        }
        .badge {

            color: #3b562b;
            display: inline-block;

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff7ea;
            width: 90%;
            max-width: 750px;
            border-radius: 48px;
            padding: 20px 25px 30px;

            border: 1px solid #e7cf97;

            font-size: 0.9rem;

        .btn-close { background: #7a6e54; color: white; }
        .btn-search { background: #3a6b8f; color: white; }
        .btn-share { background: #1f6392; color: white; }
        .btn-view { background: #8b6b3c; color: white; }

            font-size: 28px;
            cursor: pointer;
            color: #8b6b3c;

        .result-list, .review-list {

            70% { opacity: 1; }

</head>

<!-- مودال إضافة/تعديل العبرة (حقل نص واحد) -->
<div id="lessonModal" class="modal">
    <div class="modal-content">
        <span class="close-icon" id="closeModalBtn">&times;</span>
        <h3>📝 العبرة</h3>
        <div class="modal-detail" id="modalAyaInfo"></div>

        <div class="modal-buttons">
            <button id="saveLessonBtn" class="btn btn-primary">💾 حفظ العبرة</button>
            <button id="viewLessonBtn" class="btn btn-view">👁️ اعرض العبرة</button>
            <button id="shareLessonBtn" class="btn btn-share">📤 مشاركة</button>
            <button id="deleteLessonBtn" class="btn btn-danger">🗑️ حذف</button>
            <button id="cancelModalBtn" class="btn btn-close">إغلاق</button>
        </div>
    </div>
</div>

<!-- مودال عرض العبرة - بحجم الشاشة -->
<div id="viewModal" class="modal fullscreen-modal">
    <div class="modal-content">
        <span class="close-icon" id="closeViewModalBtn">&times;</span>
        <h3>📖 ثمرة التدبر</h3>
        <div id="viewContent" class="lesson-display"></div>
        <div class="modal-buttons">
            <button id="closeViewBtn" class="btn btn-close">إغلاق</button>
        </div>
    </div>
</div>

<!-- مودال عبرة اليوم -->
<div id="dailyModal" class="modal">

        <span class="close-icon" id="closeDailyBtn">&times;</span>
        <h3>⭐ عبرة اليوم</h3>

        <div class="modal-buttons">
            <button id="closeDailyModalBtn" class="btn btn-close">إغلاق</button>
        </div>
    </div>
</div>

<!-- مودال المراجعة -->
<div id="reviewModal" class="modal">
    <div class="modal-content">
        <span class="close-icon" id="closeReviewBtn">&times;</span>
        <h3>📖 مراجعة العبر</h3>
        <div id="reviewListContainer" class="review-list"></div>
        <div class="modal-buttons">
            <button id="closeReviewModalBtn" class="btn btn-close">إغلاق</button>
        </div>
    </div>
</div>

<!-- مودال البحث -->
<div id="searchModal" class="modal">
    <div class="modal-content">
        <span class="close-icon" id="closeSearchBtn">&times;</span>
        <h3>🔍 بحث في العبر</h3>
        <div class="search-section">
            <input type="text" id="searchSurahName" class="search-input" placeholder="اسم السورة" list="surahNamesList">
            <datalist id="surahNamesList"></datalist>
            <input type="number" id="searchAyaNumber" class="search-input" placeholder="رقم الآية" min="1">
            <button id="executeSearchBtn" class="btn btn-search">🔍 بحث</button>
            <button id="resetSearchBtn" class="btn btn-close">🗑️ مسح</button>
        </div>
        <div id="searchResultContainer" class="result-list"></div>
        <div class="modal-buttons">
            <button id="closeSearchModalBtn" class="btn btn-close">إغلاق</button>
        </div>
    </div>
</div>

    let lessonsDB = {};  // { "surahIndex_ayaNum": { text: "النص الكامل", timestamp } }

    function loadFromStorage() { const s = localStorage.getItem("AyaWaEbra_LessonsV4"); if(s) lessonsDB = JSON.parse(s); }
    function saveToStorage() { localStorage.setItem("AyaWaEbra_LessonsV4", JSON.stringify(lessonsDB)); }
    function getKey(i,a) { return `${i}_${a}`; }

    function setLesson(i,a, text) {
        const k = getKey(i,a);
        if(!text.trim()) { if(lessonsDB[k]) delete lessonsDB[k]; }
        else { lessonsDB[k] = { text: text.trim(), timestamp: Date.now() }; }
        saveToStorage(); refreshSurahsUI();
    }
    function deleteLesson(i,a) { delete lessonsDB[getKey(i,a)]; saveToStorage(); refreshSurahsUI(); }
    function getLessonText(i,a) { const d = lessonsDB[getKey(i,a)]; return d ? d.text : ""; }

    function getLatestLesson() {
        let latest=null, max=-1;
        for(let [k,d] of Object.entries(lessonsDB)) if(d.timestamp>max && d.text.trim()) { max=d.timestamp; latest={key:k, text:d.text}; }
        if(!latest) return null;
        let [idx, ay] = latest.key.split("_").map(Number);
        return { surahName: surahsData[idx].name, ayaNum: ay, text: latest.text };
    }
    function getAllLessonsOrdered() {
        let items=[];
        for(let [k,d] of Object.entries(lessonsDB)) if(d.text && d.text.trim()) {
            let [idx, ay] = k.split("_").map(Number);
            items.push({ surahName: surahsData[idx].name, ayaNum: ay, text: d.text, timestamp: d.timestamp });
        }
        items.sort((a,b)=>a.timestamp-b.timestamp);
        return items;
    }

    let currentSurah=null, currentAya=null, currentName=null;
    function openLessonModal(idx, ay, name) {
        currentSurah=idx; currentAya=ay; currentName=name;
        document.getElementById("modalAyaInfo").innerHTML = `📖 سورة ${name} | الآية ${ay}`;
        document.getElementById("modalLessonText").value = getLessonText(idx,ay);
        document.getElementById("lessonModal").style.display="flex";
    }
    function closeLessonModal() { document.getElementById("lessonModal").style.display="none"; currentSurah=null; currentAya=null; currentName=null; }
    function saveCurrentLesson() {
        if(currentSurah!==null && currentAya!==null) {
            let t = document.getElementById("modalLessonText").value;
            setLesson(currentSurah, currentAya, t);
            closeLessonModal();
            if(t.trim()) showToast("✅ تم حفظ العبرة","#2c7840");
        }
    }
    function deleteCurrentLesson() {
        if(currentSurah!==null && currentAya!==null) {
            deleteLesson(currentSurah, currentAya);
            document.getElementById("modalLessonText").value = "";
            showToast("🗑️ تم حذف العبرة","#b65341");
        }
    }

    // عرض العبرة في مودال بحجم الشاشة مع الحفاظ على التنسيق
    function viewCurrentLesson() {
        if(currentSurah===null || currentAya===null) return;
        let text = getLessonText(currentSurah, currentAya);
        const container = document.getElementById("viewContent");
        if(text && text.trim()) {
            container.innerHTML = text.replace(/\n/g, '<br>');
        } else {
            container.innerHTML = "📭 لا توجد عبرة مسجلة لهذه الآية بعد.<br>✍️ أضف عبرتك الآن.";
        }
        document.getElementById("viewModal").style.display = "flex";
    }
    
    function closeViewModal() { document.getElementById("viewModal").style.display = "none"; }

    async function shareCurrentLesson() {
        if(currentSurah===null || currentAya===null) return;
        let t = document.getElementById("modalLessonText").value.trim();
        if(!t) { showToast("⚠️ لا توجد عبرة للمشاركة","#d49b3a"); return; }
        let shareText = `📖 آية وعبرة\nسورة ${currentName} - الآية ${currentAya}\n\n${t}`;
        if(navigator.share) { try { await navigator.share({ title: `عبرة من سورة ${currentName}`, text: shareText }); showToast("✓ تمت المشاركة","#2c7840"); } catch(e) { if(e.name!=='AbortError') copyToClipboard(shareText); } }
        else copyToClipboard(shareText);
    }
    function copyToClipboard(t) { navigator.clipboard.writeText(t).then(()=>showToast("📋 تم نسخ العبرة","#2c7840")).catch(()=>showToast("❌ فشل النسخ","#b65341")); }
    function showToast(msg,bg) { let toast = document.createElement('div'); toast.className='share-toast'; toast.style.background=bg; toast.textContent=msg; document.body.appendChild(toast); setTimeout(()=>toast.remove(),2800); }

    function showDailyLesson() {
        let latest = getLatestLesson();
        let div = document.getElementById("dailyContent");
        if(latest) div.innerHTML = `<div style="text-align:right;">✨ <strong>سورة ${latest.surahName} - الآية ${latest.ayaNum}</strong><br><br>📜 العبرة:<br> “${latest.text.substring(0,200)}${latest.text.length>200?'...':''}”</div>`;
        else div.innerHTML = "📭 لا توجد عبرة مسجلة بعد";
        document.getElementById("dailyModal").style.display = "flex";
    }
    function showReview() {
        let items = getAllLessonsOrdered();
        let cont = document.getElementById("reviewListContainer");
        if(!items.length) cont.innerHTML = "<div class='no-result'>📭 لم يتم تسجيل أي عبرة بعد</div>";
        else cont.innerHTML = items.map(i=>`<div class="review-item"><div class="review-aya">📖 سورة ${i.surahName} - الآية ${i.ayaNum}</div><div class="review-text">${i.text.substring(0,150)}${i.text.length>150?'...':''}</div></div>`).join("");
        document.getElementById("reviewModal").style.display = "flex";
    }
    function executeSearch() {
        let surah = document.getElementById("searchSurahName").value.trim();
        let aya = document.getElementById("searchAyaNumber").value;
        let results = [];
        for(let [k,d] of Object.entries(lessonsDB)) if(d.text && d.text.trim()) {
            let [idx, num] = k.split("_").map(Number);
            let name = surahsData[idx].name;
            let match = true;
            if(surah && name !== surah) match=false;
            if(aya && num !== parseInt(aya)) match=false;
            if(match) results.push({ surahName: name, ayaNum: num, text: d.text });
        }
        let cont = document.getElementById("searchResultContainer");
        if(!results.length) cont.innerHTML = "<div class='no-result'>🔍 لا توجد نتائج</div>";
        else cont.innerHTML = results.map(r=>`<div class="result-item"><div class="result-aya">📖 سورة ${r.surahName} - الآية ${r.ayaNum}</div><div class="result-text">${r.text.substring(0,150)}${r.text.length>150?'...':''}</div></div>`).join("");
    }
    function resetSearch() { document.getElementById("searchSurahName").value=""; document.getElementById("searchAyaNumber").value=""; document.getElementById("searchResultContainer").innerHTML="<div class='no-result'>🔍 أدخل اسم السورة و/أو رقم الآية</div>"; }
    function openSearchModal() { resetSearch(); document.getElementById("searchModal").style.display="flex"; }

    function refreshSurahsUI() {
        const container = document.getElementById("surahsGrid");
        container.innerHTML = "";
        surahsData.forEach((s,idx) => {
            let typeText = s.type==="makki"?"مكية":"مدنية";
            let typeClass = s.type==="makki"?"makki":"madani";
            let card = document.createElement("div"); card.className = "surah-card";
            card.innerHTML = `
                <div class="surah-header">
                    <div class="surah-name">${s.name} <small>(${s.versesCount} آية)</small><span class="surah-type ${typeClass}">${typeText}</span></div>
                    <select class="aya-select" data-idx="${idx}" data-name="${s.name}"><option value="">-- اختر آية --</option>${Array.from({length:s.versesCount},(_,i)=>`<option value="${i+1}">الآية ${i+1}</option>`).join('')}</select>
                </div>
                <div class="lessons-preview"><span class="badge">💡 لم تُسجل أي عبرة بعد</span></div>
            `;
            let preview = card.querySelector(".lessons-preview");
            let lessonsHere = [];
            for(let a=1; a<=s.versesCount; a++) if(getLessonText(idx,a)) lessonsHere.push(`الآية ${a}`);
            if(lessonsHere.length) preview.innerHTML = `<span class="badge">📌 عبَر مسجلة: ${lessonsHere.slice(0,5).join(", ")}${lessonsHere.length>5?" ...":""}</span>`;
            let select = card.querySelector(".aya-select");
            select.addEventListener("change",(e)=>{ if(e.target.value) { openLessonModal(idx, parseInt(e.target.value), select.dataset.name); select.value=""; } });
            container.appendChild(card);
        });
    }

    function init() {
        loadFromStorage();
        refreshSurahsUI();
        surahsData.forEach(s=>{ let opt=document.createElement("option"); opt.value=s.name; document.getElementById("surahNamesList").appendChild(opt); });
        document.getElementById("closeModalBtn").onclick=closeLessonModal;
        document.getElementById("cancelModalBtn").onclick=closeLessonModal;
        document.getElementById("saveLessonBtn").onclick=saveCurrentLesson;
        document.getElementById("deleteLessonBtn").onclick=deleteCurrentLesson;
        document.getElementById("shareLessonBtn").onclick=shareCurrentLesson;
        document.getElementById("viewLessonBtn").onclick=viewCurrentLesson;
        document.getElementById("closeViewModalBtn").onclick=closeViewModal;
        document.getElementById("closeViewBtn").onclick=closeViewModal;
        document.getElementById("dailyVerseBtn").onclick=showDailyLesson;
        document.getElementById("closeDailyBtn").onclick=()=>document.getElementById("dailyModal").style.display="none";
        document.getElementById("closeDailyModalBtn").onclick=()=>document.getElementById("dailyModal").style.display="none";
        document.getElementById("reviewBtn").onclick=showReview;
        document.getElementById("closeReviewBtn").onclick=()=>document.getElementById("reviewModal").style.display="none";
        document.getElementById("closeReviewModalBtn").onclick=()=>document.getElementById("reviewModal").style.display="none";
        document.getElementById("searchBtn").onclick=openSearchModal;
        document.getElementById("closeSearchBtn").onclick=()=>document.getElementById("searchModal").style.display="none";
        document.getElementById("closeSearchModalBtn").onclick=()=>document.getElementById("searchModal").style.display="none";
        document.getElementById("executeSearchBtn").onclick=executeSearch;
        document.getElementById("resetSearchBtn").onclick=resetSearch;
        window.onclick = (e) => { if(e.target.classList.contains("modal")) e.target.style.display = "none"; };
    }
    init();
</script>
</body>
</html>
